<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Socket.IO Chat</title>
    <style>
      body { margin: 0; padding-bottom: 3rem; font-family: Arial, sans-serif; }
      #form { position: fixed; bottom: 0; left: 0; right: 0; display: flex; }
      #input { flex: 1; padding: 0.5rem; }
      #messages { list-style-type: none; margin: 0; padding: 0; }
      #messages li { padding: 0.5rem 1rem; }
      #status { text-align: center; font-size: 0.9rem; color: #444; }
    </style>
  </head>
  <body>

    <ul id="messages"></ul>
    <div id="status">Status: Connecting...</div>

    <!-- Formulaire d'envoi -->
    <form id="form">
      <input id="input" autocomplete="off" placeholder="Type a message..." />
      <button>Send</button>
      <button id="toggle-btn">Disconnect</button>
    </form>

    <!-- Charger Socket.IO -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
      // Connexion Socket.IO avec reconnexion automatique
      const socket = io({ autoConnect: true, reconnection: true });

      const form = document.getElementById('form');
      const input = document.getElementById('input');
      const messages = document.getElementById('messages');
      const statusDiv = document.getElementById('status');
      const toggleBtn = document.getElementById('toggle-btn');

      // Ajouter un message dans la liste
      function addMessage(text, italic = false) {
        const item = document.createElement('li');
        if (italic) item.style.fontStyle = 'italic';
        item.textContent = text;
        messages.appendChild(item);
        window.scrollTo(0, document.body.scrollHeight);
      }

      // Envoi du message au serveur
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        if (input.value && socket.connected) {
          socket.emit('chat message', input.value);
          input.value = '';
        }
      });

      // État de connexion affiché
      socket.on('connect', () => {
        statusDiv.textContent = 'Status: Connected';
        toggleBtn.innerText = 'Disconnect';
        addMessage(`You connected (id: ${socket.id})`, true);
      });

      socket.on('disconnect', () => {
        statusDiv.textContent = 'Status: Disconnected';
        toggleBtn.innerText = 'Connect';
      });

      // Réception d'un message normal
      socket.on('chat message', (msg) => {
        addMessage(msg);
      });

      // Réception d'un message de statut utilisateur
      socket.on('user status', (data) => {
        addMessage(`User ${data.id} ${data.status}`, true);
      });

      // Rejoindre ou quitter des rooms (facultatif)
      // Exemple : socket.emit('join room', 'room1');
      socket.on('room message', (msg) => {
        addMessage(msg, true);
      });

      // Bouton Connect / Disconnect
      toggleBtn.addEventListener('click', (e) => {
        e.preventDefault();
        if (socket.connected) socket.disconnect();
        else socket.connect();
      });
    </script>

  </body>
</html>
